<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3 Treemap Spike - Code Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        #breadcrumb {
            margin-bottom: 10px;
            font-size: 14px;
            color: #888;
        }

        #breadcrumb span {
            cursor: pointer;
            color: #4fc3f7;
        }

        #breadcrumb span:hover {
            text-decoration: underline;
        }

        #chart {
            width: 100%;
            height: calc(100vh - 120px);
            background: #252526;
            border-radius: 4px;
        }

        .node {
            cursor: pointer;
            stroke: #1e1e1e;
            stroke-width: 2px;
        }

        .node:hover {
            stroke: #4fc3f7;
            stroke-width: 3px;
        }

        text {
            pointer-events: none;
            fill: white;
            font-size: 12px;
            text-anchor: middle;
        }

        .label-small {
            font-size: 10px;
        }

        #stats {
            margin-top: 10px;
            padding: 10px;
            background: #252526;
            border-radius: 4px;
            font-size: 14px;
        }

        #stats span {
            margin-right: 20px;
        }
    </style>
</head>
<body>
    <h1>Code Volume Treemap - D3 Spike</h1>
    <div id="breadcrumb">
        <span id="root-crumb">my-analysis-set</span>
    </div>
    <div id="stats"></div>
    <div id="chart"></div>

    <script>
        // Sample hierarchical data structure
        // Represents: my-analysis-set with 2 repos
        const data = {
            name: "my-analysis-set",
            children: [
                {
                    name: "backend-api",
                    children: [
                        {
                            name: "src",
                            children: [
                                {
                                    name: "services",
                                    children: [
                                        { name: "auth.py", value: 1234 },
                                        { name: "database.py", value: 2100 },
                                        { name: "api.py", value: 890 },
                                        { name: "models.py", value: 3400 }
                                    ]
                                },
                                {
                                    name: "controllers",
                                    children: [
                                        { name: "users.py", value: 1500 },
                                        { name: "products.py", value: 1800 },
                                        { name: "orders.py", value: 2200 }
                                    ]
                                },
                                {
                                    name: "utils",
                                    children: [
                                        { name: "helpers.py", value: 600 },
                                        { name: "validators.py", value: 450 },
                                        { name: "formatters.py", value: 320 }
                                    ]
                                }
                            ]
                        },
                        {
                            name: "tests",
                            children: [
                                { name: "test_auth.py", value: 800 },
                                { name: "test_api.py", value: 950 },
                                { name: "test_models.py", value: 1100 }
                            ]
                        }
                    ]
                },
                {
                    name: "frontend",
                    children: [
                        {
                            name: "components",
                            children: [
                                { name: "Header.vue", value: 450 },
                                { name: "Sidebar.vue", value: 380 },
                                { name: "ProductList.vue", value: 890 },
                                { name: "UserProfile.vue", value: 620 }
                            ]
                        },
                        {
                            name: "views",
                            children: [
                                { name: "Dashboard.vue", value: 1200 },
                                { name: "Products.vue", value: 980 },
                                { name: "Settings.vue", value: 560 }
                            ]
                        },
                        {
                            name: "utils",
                            children: [
                                { name: "api.js", value: 340 },
                                { name: "format.js", value: 210 }
                            ]
                        }
                    ]
                },
                {
                    name: "shared",
                    children: [
                        {
                            name: "types",
                            children: [
                                { name: "user.ts", value: 230 },
                                { name: "product.ts", value: 180 }
                            ]
                        },
                        {
                            name: "constants",
                            children: [
                                { name: "config.ts", value: 150 }
                            ]
                        }
                    ]
                }
            ]
        };

        // Chart configuration
        const width = document.getElementById('chart').clientWidth;
        const height = document.getElementById('chart').clientHeight;

        // Color scale (based on depth in hierarchy)
        const color = d3.scaleOrdinal()
            .domain([0, 1, 2, 3, 4])
            .range(["#264653", "#2a9d8f", "#e9c46a", "#f4a261", "#e76f51"]);

        // Create SVG
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // State: current node being displayed
        let currentNode = null;
        let currentPath = ["my-analysis-set"];

        function render(node) {
            currentNode = node;

            // Clear previous rendering
            svg.selectAll("*").remove();

            // Create hierarchy
            const root = d3.hierarchy(node)
                .sum(d => d.value)
                .sort((a, b) => b.value - a.value);

            // Create treemap layout (squarified)
            const treemap = d3.treemap()
                .size([width, height])
                .paddingOuter(3)
                .paddingInner(1)
                .round(true);

            treemap(root);

            // Render rectangles
            const nodes = svg.selectAll("g")
                .data(root.leaves())
                .join("g")
                .attr("transform", d => `translate(${d.x0},${d.y0})`);

            nodes.append("rect")
                .attr("class", "node")
                .attr("width", d => d.x1 - d.x0)
                .attr("height", d => d.y1 - d.y0)
                .attr("fill", d => color(d.depth))
                .on("click", (event, d) => {
                    // If clicked node has children, drill down
                    if (d.data.children) {
                        currentPath.push(d.data.name);
                        updateBreadcrumb();
                        render(d.data);
                    } else {
                        // If parent has siblings, drill to parent level
                        if (d.parent && d.parent.data.children && d.parent.data.children.length > 1) {
                            currentPath.push(d.parent.data.name);
                            updateBreadcrumb();
                            render(d.parent.data);
                        }
                    }
                });

            // Add labels (only if rectangle is big enough)
            nodes.append("text")
                .attr("x", d => (d.x1 - d.x0) / 2)
                .attr("y", d => (d.y1 - d.y0) / 2)
                .text(d => {
                    const width = d.x1 - d.x0;
                    const height = d.y1 - d.y0;
                    // Only show label if box is large enough
                    if (width > 60 && height > 20) {
                        return d.data.name;
                    }
                    return "";
                })
                .attr("class", d => {
                    const width = d.x1 - d.x0;
                    return width < 100 ? "label-small" : "";
                });

            // Add line count as secondary label
            nodes.append("text")
                .attr("x", d => (d.x1 - d.x0) / 2)
                .attr("y", d => (d.y1 - d.y0) / 2 + 15)
                .text(d => {
                    const width = d.x1 - d.x0;
                    const height = d.y1 - d.y0;
                    if (width > 80 && height > 35) {
                        return `${d.value.toLocaleString()} lines`;
                    }
                    return "";
                })
                .attr("class", "label-small")
                .style("fill", "#ccc");

            // Update stats
            updateStats(root);
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            breadcrumb.innerHTML = currentPath.map((segment, idx) => {
                if (idx === 0) {
                    return `<span onclick="navigateToRoot()">${segment}</span>`;
                }
                return ` / <span onclick="navigateTo(${idx})">${segment}</span>`;
            }).join('');
        }

        function updateStats(root) {
            const totalLines = root.value;
            const fileCount = root.leaves().length;
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                <span><strong>Total Lines:</strong> ${totalLines.toLocaleString()}</span>
                <span><strong>Files:</strong> ${fileCount}</span>
                <span><strong>Level:</strong> ${currentNode.name}</span>
            `;
        }

        function navigateToRoot() {
            currentPath = ["my-analysis-set"];
            updateBreadcrumb();
            render(data);
        }

        function navigateTo(index) {
            currentPath = currentPath.slice(0, index + 1);
            updateBreadcrumb();

            // Navigate to the node at this path
            let node = data;
            for (let i = 1; i < currentPath.length; i++) {
                node = node.children.find(c => c.name === currentPath[i]);
            }
            render(node);
        }

        // Initial render
        render(data);
    </script>
</body>
</html>
