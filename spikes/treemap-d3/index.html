<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3 Treemap Spike - Code Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        #breadcrumb {
            margin-bottom: 10px;
            font-size: 14px;
            color: #888;
        }

        #breadcrumb span {
            cursor: pointer;
            color: #4fc3f7;
        }

        #breadcrumb span:hover {
            text-decoration: underline;
        }

        #chart {
            width: 100%;
            height: calc(100vh - 150px);
            background: #252526;
            border-radius: 4px;
        }

        .node {
            cursor: pointer;
            stroke: #1e1e1e;
            stroke-width: 2px;
        }

        .node:hover {
            stroke: #4fc3f7;
            stroke-width: 3px;
        }

        text {
            pointer-events: none;
            fill: #1a1a1a;
            font-size: 12px;
            font-weight: 600;
            text-anchor: middle;
        }

        .label-small {
            font-size: 10px;
        }

        .label-secondary {
            fill: #333;
            font-weight: 400;
        }

        #stats {
            margin-top: 10px;
            padding: 10px;
            background: #252526;
            border-radius: 4px;
            font-size: 14px;
        }

        #stats span {
            margin-right: 20px;
        }

        #statusline {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 20px;
            background: #1e1e1e;
            border-top: 1px solid #3e3e3e;
            font-size: 13px;
            font-family: 'Monaco', 'Menlo', monospace;
            color: #888;
            height: 30px;
            line-height: 30px;
        }

        #statusline.active {
            color: #d4d4d4;
        }
    </style>
</head>
<body>
    <h1>Code Volume Treemap - D3 Spike</h1>
    <div id="breadcrumb">
        <span id="root-crumb">my-analysis-set</span>
    </div>
    <div id="stats"></div>
    <div id="chart"></div>
    <div id="statusline">Hover over a file or directory to see its path</div>

    <script>
        // Sample hierarchical data structure
        // Represents: my-analysis-set with 2 repos
        const data = {
            name: "my-analysis-set",
            children: [
                {
                    name: "backend-api",
                    children: [
                        {
                            name: "src",
                            children: [
                                {
                                    name: "services",
                                    children: [
                                        { name: "auth.py", value: 1234 },
                                        { name: "database.py", value: 2100 },
                                        { name: "api.py", value: 890 },
                                        { name: "models.py", value: 3400 }
                                    ]
                                },
                                {
                                    name: "controllers",
                                    children: [
                                        { name: "users.py", value: 1500 },
                                        { name: "products.py", value: 1800 },
                                        { name: "orders.py", value: 2200 }
                                    ]
                                },
                                {
                                    name: "utils",
                                    children: [
                                        { name: "helpers.py", value: 600 },
                                        { name: "validators.py", value: 450 },
                                        { name: "formatters.py", value: 320 }
                                    ]
                                }
                            ]
                        },
                        {
                            name: "tests",
                            children: [
                                { name: "test_auth.py", value: 800 },
                                { name: "test_api.py", value: 950 },
                                { name: "test_models.py", value: 1100 }
                            ]
                        }
                    ]
                },
                {
                    name: "frontend",
                    children: [
                        {
                            name: "components",
                            children: [
                                { name: "Header.vue", value: 450 },
                                { name: "Sidebar.vue", value: 380 },
                                { name: "ProductList.vue", value: 890 },
                                { name: "UserProfile.vue", value: 620 }
                            ]
                        },
                        {
                            name: "views",
                            children: [
                                { name: "Dashboard.vue", value: 1200 },
                                { name: "Products.vue", value: 980 },
                                { name: "Settings.vue", value: 560 }
                            ]
                        },
                        {
                            name: "utils",
                            children: [
                                { name: "api.js", value: 340 },
                                { name: "format.js", value: 210 }
                            ]
                        }
                    ]
                },
                {
                    name: "shared",
                    children: [
                        {
                            name: "types",
                            children: [
                                { name: "user.ts", value: 230 },
                                { name: "product.ts", value: 180 }
                            ]
                        },
                        {
                            name: "constants",
                            children: [
                                { name: "config.ts", value: 150 }
                            ]
                        }
                    ]
                }
            ]
        };

        // Chart configuration
        const width = document.getElementById('chart').clientWidth;
        const height = document.getElementById('chart').clientHeight;

        // Color function: directories neutral, files colored by depth
        function getNodeColor(d) {
            // If node has children, it's a directory - use neutral gray
            if (d.data.children) {
                return "#4a4a4a";
            }

            // It's a file - color by depth using ColorBrewer Set2
            const fileColors = ["#66c2a5", "#fc8d62", "#8da0cb", "#e78ac3", "#a6d854", "#ffd92f"];
            return fileColors[d.depth % fileColors.length];
        }

        // Create SVG
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // State: current node being displayed
        let currentNode = null;
        let currentPath = ["my-analysis-set"];

        function render(node) {
            currentNode = node;

            // Clear previous rendering
            svg.selectAll("*").remove();

            // Create hierarchy
            const root = d3.hierarchy(node)
                .sum(d => d.value)
                .sort((a, b) => b.value - a.value);

            // Create treemap layout (squarified)
            const treemap = d3.treemap()
                .size([width, height])
                .paddingOuter(3)
                .paddingInner(1)
                .round(true);

            treemap(root);

            // Render rectangles (all descendants, not just leaves)
            const nodes = svg.selectAll("g")
                .data(root.descendants().filter(d => d.depth > 0))
                .join("g")
                .attr("transform", d => `translate(${d.x0},${d.y0})`);

            nodes.append("rect")
                .attr("class", "node")
                .attr("width", d => d.x1 - d.x0)
                .attr("height", d => d.y1 - d.y0)
                .attr("fill", d => getNodeColor(d))
                .on("click", (event, d) => {
                    // Find the actual data node in the original tree
                    let targetNode = findNodeByPath(data, d.data.name, currentNode);

                    // Only drill down if node has children
                    if (targetNode && targetNode.children) {
                        currentPath.push(targetNode.name);
                        updateBreadcrumb();
                        render(targetNode);
                    }
                    // If it's a leaf (file), do nothing for now
                })
                .on("mouseenter", (event, d) => {
                    // Build full path from root to this node
                    const pathParts = [];
                    let node = d;
                    while (node) {
                        pathParts.unshift(node.data.name);
                        node = node.parent;
                    }
                    const fullPath = pathParts.join(' / ');
                    const lines = d.value ? ` (${d.value.toLocaleString()} lines)` : '';

                    const statusline = document.getElementById('statusline');
                    statusline.textContent = fullPath + lines;
                    statusline.classList.add('active');
                })
                .on("mouseleave", (event, d) => {
                    const statusline = document.getElementById('statusline');
                    statusline.textContent = 'Hover over a file or directory to see its path';
                    statusline.classList.remove('active');
                });

            // Add labels (only if rectangle is big enough)
            nodes.append("text")
                .attr("x", d => (d.x1 - d.x0) / 2)
                .attr("y", d => (d.y1 - d.y0) / 2)
                .text(d => {
                    const width = d.x1 - d.x0;
                    const height = d.y1 - d.y0;
                    // Only show label if box is large enough
                    if (width > 60 && height > 20) {
                        return d.data.name;
                    }
                    return "";
                })
                .attr("class", d => {
                    const width = d.x1 - d.x0;
                    return width < 100 ? "label-small" : "";
                });

            // Add line count as secondary label
            nodes.append("text")
                .attr("x", d => (d.x1 - d.x0) / 2)
                .attr("y", d => (d.y1 - d.y0) / 2 + 15)
                .text(d => {
                    const width = d.x1 - d.x0;
                    const height = d.y1 - d.y0;
                    if (width > 80 && height > 35) {
                        return `${d.value.toLocaleString()} lines`;
                    }
                    return "";
                })
                .attr("class", "label-small label-secondary");

            // Update stats
            updateStats(root);
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            breadcrumb.innerHTML = currentPath.map((segment, idx) => {
                if (idx === 0) {
                    return `<span onclick="navigateToRoot()">${segment}</span>`;
                }
                return ` / <span onclick="navigateTo(${idx})">${segment}</span>`;
            }).join('');
        }

        function updateStats(root) {
            const totalLines = root.value;
            const fileCount = root.leaves().length;
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                <span><strong>Total Lines:</strong> ${totalLines.toLocaleString()}</span>
                <span><strong>Files:</strong> ${fileCount}</span>
                <span><strong>Level:</strong> ${currentNode.name}</span>
            `;
        }

        function navigateToRoot() {
            currentPath = ["my-analysis-set"];
            updateBreadcrumb();
            render(data);
        }

        function navigateTo(index) {
            currentPath = currentPath.slice(0, index + 1);
            updateBreadcrumb();

            // Navigate to the node at this path
            let node = data;
            for (let i = 1; i < currentPath.length; i++) {
                node = node.children.find(c => c.name === currentPath[i]);
            }
            render(node);
        }

        function findNodeByPath(root, nodeName, currentRoot) {
            // Search for node in current view's children
            if (currentRoot.children) {
                for (let child of currentRoot.children) {
                    if (child.name === nodeName) {
                        return child;
                    }
                    // Recursively search in grandchildren
                    if (child.children) {
                        let found = findNodeInTree(child, nodeName);
                        if (found) return found;
                    }
                }
            }
            return null;
        }

        function findNodeInTree(node, targetName) {
            if (node.name === targetName) {
                return node;
            }
            if (node.children) {
                for (let child of node.children) {
                    let found = findNodeInTree(child, targetName);
                    if (found) return found;
                }
            }
            return null;
        }

        // Initial render
        render(data);
    </script>
</body>
</html>
